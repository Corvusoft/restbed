name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: astyle
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install astyle
        run: |
          sudo apt-get update
          sudo apt-get install -y astyle

      - name: Check formatting
        run: |
          astyle --options=astylerc './src/*.cpp' './src/*.hpp' './test/*.cpp'
          if ! git diff --exit-code; then
            echo "::error::Code style violations found. Run 'astyle --options=astylerc ./src/*.cpp ./src/*.hpp ./test/*.cpp' and commit the result."
            exit 1
          fi

  build:
    name: ${{ matrix.os }} / ssl=${{ matrix.ssl }} / ipc=${{ matrix.ipc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        ssl: [yes, no]
        ipc: [no]
        include:
          - os: ubuntu-24.04
            ssl: yes
            ipc: yes

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libasio-dev libssl-dev catch2

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf automake libtool pkg-config asio openssl@3 catch2
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            $( [ "${{ matrix.ssl }}" = "no" ] && echo --disable-ssl ) \
            $( [ "${{ matrix.ipc }}" = "yes" ] && echo --enable-ipc )

      - name: Build
        run: make -j$(getconf _NPROCESSORS_ONLN)

      - name: Test
        run: make check || (cat test/*.log; exit 1)

  build-no-tests:
    name: ubuntu-24.04 / tests=no
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libasio-dev libssl-dev

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: ./configure --disable-tests

      - name: Build
        run: make -j$(getconf _NPROCESSORS_ONLN)

  distcheck:
    name: distcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libasio-dev libssl-dev catch2

      - name: Bootstrap & distcheck
        run: |
          ./autogen.sh
          ./configure
          make distcheck -j$(getconf _NPROCESSORS_ONLN)

  windows:
    name: windows-latest / msys2-ucrt64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel autoconf automake libtool
          pacboy: >-
            gcc:p openssl:p asio:p catch:p pkgconf:p

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make -j$(nproc)

      - name: Test
        run: make check || (cat test/*.log; exit 1)
