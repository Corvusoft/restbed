name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: ${{ matrix.os }} / ssl=${{ matrix.ssl }} / ipc=${{ matrix.ipc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        ssl: [yes, no]
        ipc: [no]
        include:
          - os: ubuntu-24.04
            ssl: yes
            ipc: yes

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libasio-dev libssl-dev catch2

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf automake libtool pkg-config asio openssl@3 catch2
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            $( [ "${{ matrix.ssl }}" = "no" ] && echo --disable-ssl ) \
            $( [ "${{ matrix.ipc }}" = "yes" ] && echo --enable-ipc )

      - name: Build
        run: make -j$(getconf _NPROCESSORS_ONLN)

      - name: Test
        run: make check || (cat test/test-suite.log; exit 1)

  distcheck:
    name: distcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libasio-dev libssl-dev catch2

      - name: Bootstrap & distcheck
        run: |
          ./autogen.sh
          ./configure
          make distcheck -j$(getconf _NPROCESSORS_ONLN)
